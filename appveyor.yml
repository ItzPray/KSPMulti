# Reference: http://www.appveyor.com/docs/appveyor-yml
# Notes:
#   - Indent each level of configuration with 2 spaces. Do not use tabs!
#   - GitHub Releases: the KSP client/server use GET https://api.github.com/repos/ItzPray/KSPMulti/releases/latest
#     which only returns a *published* non-prerelease "latest". If deploy uses `draft: true` below, publish
#     the release on GitHub (or remove draft) so in-game / API update checks can see the build.
#   - Release assets must be named to match the zips in `artifacts` (e.g. KSPMultiplayer-Client-Release.zip).

#---------------------------------#
#      general configuration      #
#---------------------------------#

version: $(smallversion).{build}

# Do not build on tags (GitHub and BitBucket)
skip_tags: true
#Do not build if we change any of this files
skip_commits:
  files:
    - '**/*.md'
    - '**/*.editorconfig'
image: Visual Studio 2019

#---------------------------------#
#    environment configuration    #
#---------------------------------#

# Optional (recommended): KSP_KSPLIBRARIES_URL = HTTPS link to your KSPLibraries.7z (passworded with ZIPPASSWORD).
#   Host the file once (S3, Azure blob SAS, Dropbox, public GitHub release, etc.) — AppVeyor download is automatic.
#   For private GitHub *API* release-asset URLs, set KSP_GITHUB_TOKEN (secure) as well.
# ZIPPASSWORD: 7-Zip password used when *creating* KSPLibraries.7z locally (must match the archive).
environment:
  smallversion: 0.29.0
  WEBHOOK_URL:
    secure: bhCOtyDF+wInocIkKfUQdxpM4csyVv7cxhUGz0NzLnFrlEZsaviEDJeDbctuv4NBM4xPkl4Wpv3rb6VwNcvEr8IWW5Te0P/kx1VeNMD5espcLKzMwy46shi630b3wvIipOeBnupc6nsiw/2liuNhJkvjdyu4wxQXVDVWNSi+t0=
  ZIPPASSWORD:
    secure: aYtowPY3EEDAWEnow3/CajwQYL9PtdXpVdSqhC3f5X4=    
cache:
  - packages -> **\packages.config
assembly_info:
  patch: true
  file: '**\AssemblyInfo.*'
  assembly_version: '{version}'
  assembly_file_version: '{version}'
  assembly_informational_version: '{version}-$(configuration)'

#---------------------------------#
#       build configuration       #
#---------------------------------#

configuration:
 - Debug
 - Release
platform: Any CPU
install:
  - ps: & "$env:APPVEYOR_BUILD_FOLDER\Scripts\PrepareKspLibrariesForBuild.ps1"
before_build:
  - ps: |
      $out = "$env:APPVEYOR_BUILD_FOLDER\External\KSPLibraries"
      $inTree = "$out\KSPLibraries.7z"
      if (-not (Test-Path $inTree)) { throw "Missing KSPLibraries.7z after install. Set KSP_KSPLIBRARIES_URL in AppVeyor, or add the file to the build tree. See AGENTS.md (AppVeyor) and Scripts\PrepareKspLibrariesForBuild.ps1" }
      & 7z e $inTree -p"$env:ZIPPASSWORD" -o"$out\"
  - ps: mkdir "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\"
   #Copy harmony dependency
  - ps: xcopy /y /s "$env:appveyor_build_folder\External\Dependencies\Harmony" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData"
  - nuget restore
build:
  parallel: true
  verbosity: minimal

after_build:
#Client post build commands
 - ps: mkdir "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\Button"
 - ps: mkdir "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\LoadingScreens" -ErrorAction SilentlyContinue
 - ps: mkdir "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\Plugins"
 - ps: mkdir "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\Localization"
 - ps: mkdir "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\PartSync"
 - ps: mkdir "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\Icons"
 - ps: mkdir "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\Flags"
 - ps: copy "$env:appveyor_build_folder\KSPMP Readme.txt" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMP Readme.txt"
 - ps: copy "$env:appveyor_build_folder\KSPMultiplayer.version" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\KSPMultiplayer.version"
 - ps: xcopy /y "$env:appveyor_build_folder\LmpClient\Resources\*.*" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\Button"
 - ps: xcopy /y "$env:appveyor_build_folder\LmpClient\bin\$env:configuration\*.*" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\Plugins"
 - ps: xcopy /y /s "$env:appveyor_build_folder\LmpClient\Localization\XML\*.*" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\Localization"
 - ps: xcopy /y /s "$env:appveyor_build_folder\LmpClient\ModuleStore\XML\*.*" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\PartSync"
 - ps: xcopy /y "$env:appveyor_build_folder\LmpClient\Resources\Icons\*.*" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\Icons"
 - ps: xcopy /y "$env:appveyor_build_folder\LmpClient\Resources\Flags\*.*" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\Flags"
 - ps: if (Test-Path "$env:appveyor_build_folder\LmpClient\Resources\LoadingScreens") { xcopy /y "$env:appveyor_build_folder\LmpClient\Resources\LoadingScreens\*.*" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData\KSPMultiplayer\LoadingScreens" 2>$null; $true }
 #Master server post build commands
 - ps: mkdir "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPMasterServer"
 - ps: xcopy /y "$env:appveyor_build_folder\MasterServer\bin\$env:configuration\*.*" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPMasterServer"
  #Server post build commands  
 - ps: dotnet publish "$env:appveyor_build_folder\Server\Server.csproj" --output $env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPServer

# After staging: run unit tests, then 7-zip in after_test
test_script:
  - ps: |
      $vs = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
      if (-not (Test-Path $vs)) { throw "vswhere not found" }
      $vst = & $vs -latest -find "**\vstest.console.exe" | Select-Object -First 1
      if (-not $vst) { throw "vstest.console not found" }
      $dll = "$env:APPVEYOR_BUILD_FOLDER\LmpCommonTest\bin\Debug\LmpCommonTest.dll"
      if (-not (Test-Path $dll)) { throw "LmpCommonTest assembly missing: $dll" }
      & $vst $dll
  - cmd: dotnet test "%APPVEYOR_BUILD_FOLDER%\ServerTest\ServerTest.csproj" -c %CONFIGURATION%

after_test:
  - ps: 7z a "$env:appveyor_build_folder\KSPMultiplayer-Client-$env:configuration.zip" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMP Readme.txt" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPClient\GameData"
  - ps: 7z a "$env:appveyor_build_folder\KSPMultiplayer-Server-$env:configuration.zip" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMP Readme.txt" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPServer"
  - ps: 7z a "$env:appveyor_build_folder\KSPMultiplayerMasterServer-$env:configuration.zip" "$env:appveyor_build_folder\FinalFiles\$env:configuration\KSPMPMasterServer"

#Post it on discord
on_success:
 - ps: if ($env:configuration -like "Debug" -and $env:WEBHOOK_URL) { & powershell -NoProfile -ExecutionPolicy Bypass -File "$env:APPVEYOR_BUILD_FOLDER\appveyor_discord.ps1" success $env:WEBHOOK_URL }

#---------------------------------#
#      artifacts configuration    #
#---------------------------------#

artifacts:
 - path: .\KSPMultiplayer-Client-$(configuration).zip
   name: KSPMultiplayer-Client-$(configuration).zip
 - path: .\KSPMultiplayer-Server-$(configuration).zip
   name: KSPMultiplayer-Server-$(configuration).zip
 - path: .\KSPMultiplayerMasterServer-$(configuration).zip
   name: KSPMultiplayerMasterServer-$(configuration).zip
#---------------------------------#
#     deployment configuration    #
#---------------------------------#

# CI token must be authorized for the target repo: https://github.com/ItzPray/KSPMulti
# Remember to *publish* draft releases (or set draft: false) so /releases/latest API works.
deploy:
 - provider: GitHub
   tag: $(smallversion)-Draft
   release: KSP Multiplayer $(smallversion)-Draft
   description: 'Build $(appveyor_build_version). In-game KSPMP update check uses the latest *published* GitHub release: https://github.com/ItzPray/KSPMulti/releases/latest'
   artifact: KSPMultiplayer-Client-$(configuration).zip, KSPMultiplayer-Server-$(configuration).zip
   auth_token:
    secure: zWJqDvz3LjR2J358JIJKICwghW/DWRzs73KWb3KApTLOreA4c8DN1tos+O3qBMR7
   draft: true
   force_update: true
   on:
    branch: master

